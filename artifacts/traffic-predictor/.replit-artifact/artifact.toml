kind = "web"
previewPath = "/"
title = "Event Traffic Impact Predictor"
version = "1.0.0"
id = "artifacts/traffic-predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22414

[services.development]
run = "pnpm --filter @workspace/traffic-predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-predictor", "run", "build" ]
publicDir = "artifacts/traffic-predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22414"
BASE_PATH = "/"
